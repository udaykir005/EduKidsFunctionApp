name: Deploy to Azure Function App  # Name of the workflow

# Trigger the workflow when a push happens to the specified branch (e.g., main)
on:
  push:
    branches:
      - master  # This means the workflow will run when you push to the 'main' branch.

jobs:
  build:  # The job that contains all the steps for the deployment
    runs-on: ubuntu-latest  # Use the latest Ubuntu runner for the job
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: '8.x'  # Replace with your actual .NET version (e.g., '7.x' or '8.x')

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --configuration Release

    - name: Publish project
      run: dotnet publish --configuration Release --output ./publish
      
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Function App
      uses: azure/functions-action@v1
      with:
        app-name: <edukidsFunctionApp>  # Replace with the name of your Azure Function App
        publish-profile: ${{ secrets.AZURE_FUNCTION_APP_PUBLISH_PROFILE }}  # Use publish profile from GitHub secrets
        package: .  # Path to your function app's code (or build output)
      env:
        AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
